# .github/workflows/deploy.yml
name: Deploy Jekyll to GitHub Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🔧 Fix permissions for Docker volume mounts
      - name: Fix file permissions
        run: |
          sudo chown -R 1001:127 .
          chmod -R u+w . || true
          # Ensure Gemfile.lock is writable
          touch Gemfile.lock && chmod u+w Gemfile.lock || true

      - name: Build site with Docker Compose
        run: docker compose run --rm jekyll

      - name: Verify build output
        run: |
          if [ ! -s "_site/index.html" ]; then
            echo "❌ Build failed: _site/index.html missing"
            exit 1
          fi
          echo "✅ Build successful"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4