name: Docker Image CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    # 🔧 Match container user (1000:1000) to prevent permission denied errors
    - name: Set workspace permissions
      run: sudo chown -R 1000:1000 .

    # 🐳 Uses your existing docker-compose.yaml, overrides default `serve` to `build`
    - name: Build site
      run: docker compose run --rm jekyll-site jekyll build --config _config.yml,_config_docker.yml

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./_site

  deploy:
    # Only deploy on direct pushes to master (skip PR builds)
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
