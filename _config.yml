# Welcome to Jekyll!
# Config for Pritom Paul's Academic Portfolio
# Based on Academic Pages template: https://github.com/academicpages/academicpages.github.io

# -------------------------
# BASIC SITE SETTINGS
# -------------------------
locale                   : "en-US"
site_theme               : "default" # Options: "default", "air", "sunrise", "mint", "dirt", "contrast"
title                    : "Pritom Paul"
title_separator          : "-"
name                     : &name "Pritom Paul"
description              : &description "Software Engineer & Researcher | Computer Vision, Deep Learning, Industrial Automation"
url                      : "https://pritom-paul.github.io/PritomPaul.github.io/"
baseurl                  : "" # e.g., "/portfolio" if hosted at username.github.io/portfolio
repository               : "PritomPaul/PritomPaul.github.io"

# -------------------------
# SITE AUTHOR (Sidebar Profile)
# -------------------------
author:
  # Biographic Information
  avatar           : "profile.png" # Place your photo in /images/profile.png
  name             : "Pritom Paul"
  pronouns         : # e.g., "he/him"
  bio              : "Software Engineer with 2+ years in backend systems, industrial automation, and computer vision. Currently transitioning to research in deep learning and applied computer vision."
  location         : "Dhaka, Bangladesh"
  employer         : "AlterSense Limited"
  uri              : # Personal website URL if different from site url
  email            : "pritompaul98official@gmail.com"

  # Academic Profiles (fill as available)
  academia         : # https://independent.academia.edu/YourName
  arxiv            : # https://arxiv.org/a/yourid
  googlescholar    : # https://scholar.google.com/citations?user=YOUR_ID ← Add when available
  inspire-hep      : 
  impactstory      : 
  orcid            : # https://orcid.org/0000-0000-0000-0000 ← Add when available
  semantic         : 
  ssrn             : 
  pubmed           : 
  researchgate     : # https://www.researchgate.net/profile/Your-Name
  scopus           : 
  zotero           : 

  # Development & Code
  github           : "Pritom-Paul"
  gitlab           : 
  bitbucket        : 
  codepen          : 
  stackoverflow    : # Use "123456/username" format if needed
  kaggle           : 

  # Professional & Social
  linkedin         : "pritom-paul-30b40a228" # Just the username part after /in/
  twitter          : 
  bluesky          : 
  mastodon         : 
  medium           : 
  youtube          : 
  instagram        : 
  facebook         : 
  # Removed irrelevant fields: artstation, dribbble, flickr, foursquare, etc.

# -------------------------
# PUBLICATION CATEGORIES
# -------------------------
# Keep structure for future research output
publication_category:
  manuscripts:
    title: 'Journal Articles'    
  conferences:
    title: 'Conference Papers'
  preprints:
    title: 'Preprints & Working Papers'
  technical_reports:
    title: 'Technical Reports'

# -------------------------
# SITE BEHAVIOR & DISPLAY
# -------------------------
teaser                   : "teaser.jpg" # Optional fallback image in /images/
breadcrumbs              : false
words_per_minute         : 200
future                   : true # Show projects with future dates (e.g., ongoing research)
read_more                : "disabled"
talkmap_link             : false

# Comments (disable by default; enable if needed)
comments:
  provider               : false
  # disqus:
  #   shortname          : "your-disqus-shortname"

# RSS Feed
atom_feed:
  hide                   : false
  path                   : 

# -------------------------
# SEO & SOCIAL SHARING
# -------------------------
# Leave verification tags blank; add via site headers if needed
google_site_verification :
bing_site_verification   :

# Open Graph / Twitter Cards
og_image                 : "profile.png"
og_description           : "Portfolio of Pritom Paul: Software Engineer researching computer vision and deep learning systems."

social:
  type                   : Person
  name                   : "Pritom Paul"
  links:
    - https://github.com/Pritom-Paul
    - https://www.linkedin.com/in/pritom-paul-30b40a228/

# -------------------------
# ANALYTICS (disabled by default)
# -------------------------
analytics:
  provider               : false
  # google:
  #   tracking_id        : "UA-XXXXXXXXX-X"

# -------------------------
# FILE HANDLING
# -------------------------
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - CHANGELOG
  - Capfile
  - config
  - Dockerfile
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - local
  - log
  - node_modules
  - package.json*
  - Rakefile
  - README
  - tmp
  - vendor
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# -------------------------
# MARKDOWN & SYNTAX
# -------------------------
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# -------------------------
# COLLECTIONS (Content Types)
# -------------------------
collections:
  teaching:
    output: true
    permalink: /teaching/:path/
  publications:
    output: true
    permalink: /publications/:path/
  portfolio:
    output: true
    permalink: /projects/:path/ # Renamed for clarity: your projects → /projects/
  talks:
    output: true
    permalink: /talks/:path/

# -------------------------
# DEFAULTS (Layout Settings)
# -------------------------
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
      share: true
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: true
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true
      share: true
      comment: false
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      author_profile: true
      share: true

# -------------------------
# STYLING & OUTPUT
# -------------------------
sass:
  sass_dir: _sass
  style: compressed

permalink: /:categories/:title/
timezone: Asia/Dhaka # Match your location

# -------------------------
# PLUGINS (GitHub Pages compatible)
# -------------------------
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

# -------------------------
# ARCHIVES
# -------------------------
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# -------------------------
# HTML COMPRESSION
# -------------------------
compress_html:
  clippings: all
  ignore:
    envs: development